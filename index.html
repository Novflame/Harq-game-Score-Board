
    <!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>🔥 حريق</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  

</head>

<body>

<!-- 🟢 شاشة البداية -->
<div id="start-screen">
  <h1>🔥 حريق</h1>

  <button id="new-game-btn">➕   جدول جديد</button>
  <button id="open-matches-btn">عرض الجدول </button>
  <button onclick="alert('تم تطويره بواسطة نوفا 🚀')">👤 عن المطور</button>
</div>

<!-- 🟢 شاشة اللعبة -->
<div id="game-container" class="hidden">

  <h2>🎮 </h2>

  <!-- إدخال لاعب -->
  <input id="name" placeholder="اسم اللاعب">
  <button id="btn">➕ إضافة لاعب</button>

  <br>

  <!-- إدخال سكور -->
  <input id="new-score" type="number" placeholder="سكور">
  <button id="new-btn">➕ إضافة سكور</button>

  <br>

  <button id="reset-btn">🔄 إعادة اللعبة</button>

  <!-- الجدول -->
  <table>
    <thead>
      <tr id="head-row"></tr>
    </thead>
    <tbody>
      <tr id="score-row"></tr>
    </tbody>
  </table>

  <div id="alert-container"></div>

</div>

<!-- 🟢 overlay الفائز -->
<div id="winner-overlay" class="hidden">
  <h1 id="winner-name"></h1>
  <button type="button" id="close-overlay">عرض الجدول</button>
</div>

<!-- 🟢 شاشة المباريات -->
<div id="matches-screen" class="hidden">
  <h2>📜 سجل المباريات</h2>
  <div id="matches-list"></div>
  <button id="back-btn">⬅ رجوع</button>
   
 
</div>

<!-- 🟢 ربط JS -->
 <script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/history.js"></script>
<script src="js/winner.js"></script>
<script src="js/app.js"></script>


</body>
</html>
